version: "3.9"

services:
  app:
    build: .
    container_name: sitag-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data:/app/backend/data
    env_file:
      - .env

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: sitag-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
